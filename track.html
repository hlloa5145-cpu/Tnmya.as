<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة الطلب | بنك التنمية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #006c35; --gold: #c5a059; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f0; direction: rtl; padding: 20px; }
        .track-card { max-width: 500px; margin: 40px auto; background: white; border-radius: 20px; padding: 40px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .input-group { margin: 25px 0; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 1.1rem; text-align: center; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; }
        
        /* نظام التتبع (Timeline) */
        .timeline { display: none; margin-top: 40px; text-align: right; }
        .t-step { position: relative; padding-right: 30px; margin-bottom: 20px; border-right: 2px solid #ddd; }
        .t-step.active { border-right-color: var(--primary); }
        .t-step::after { content: ''; position: absolute; right: -7px; top: 0; width: 12px; height: 12px; background: #ddd; border-radius: 50%; }
        .t-step.active::after { background: var(--primary); box-shadow: 0 0 10px var(--primary); }
    </style>
</head>
<body>

<div class="track-card">
    <i class="fas fa-search-location" style="font-size: 3rem; color: var(--gold);"></i>
    <h2>متابعة حالة طلبك</h2>
    <p>أدخل رقم الجوال المسجل للاستعلام</p>
    
    <div class="input-group">
        <input type="tel" id="trackPhone" placeholder="05xxxxxxxx">
    </div>
    <button class="btn-search" onclick="doTrack()">استعلام الآن</button>

    <div id="trackResult" class="timeline">
        <div class="t-step" id="s1"><strong>استلام الطلب</strong><br><small>تم استلام طلبك بنجاح في النظام.</small></div>
        <div class="t-step" id="s2"><strong>المراجعة والتدقيق</strong><br><small>جاري مراجعة البيانات وصورة الهوية.</small></div>
        <div class="t-step" id="s3"><strong>القرار النهائي</strong><br><small id="finalText">بانتظار قرار اللجنة.</small></div>
    </div>
</div>

<script>
    const { createClient } = supabase;
    const _trackClient = createClient('https://fyaxiwtkjdjmgfovsfmb.supabase.co', 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YXhpd2t0amRqbWdmb3ZzZm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njc5MzcsImV4cCI6MjA5MjU0MzkzN30.gdkzSZJIlaOVSiLgvEy_wKV9cq1ZAMIkM8DMB9yvpgU');

    async function doTrack() {
        const phone = document.getElementById('trackPhone').value;
        const res = await _trackClient.from('applications').select('*').eq('phone', phone).maybeSingle();

        if(!res.data) { alert('رقم الجوال غير موجود'); return; }

        document.getElementById('trackResult').style.display = 'block';
        document.getElementById('s1').className = 't-step active';
        
        if(res.data.status === 'pending') {
            document.getElementById('s2').className = 't-step active';
        } else if(res.data.status === 'accepted') {
            document.getElementById('s2').className = 't-step active';
            document.getElementById('s3').className = 't-step active';
            document.getElementById('finalText').innerText = "مبروك! تم قبول طلبك.";
        } else if(res.data.status === 'rejected') {
            document.getElementById('s2').className = 't-step active';
            document.getElementById('s3').className = 't-step active';
            document.getElementById('s3').style.borderRightColor = 'red';
            document.getElementById('finalText').innerText = "نعتذر، تم رفض الطلب.";
        }
    }
</script>
</body>
</html>
