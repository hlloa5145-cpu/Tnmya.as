<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شيك على طلبك | بنك التنمية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #006c35; --bg: #f4f7f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); direction: rtl; margin: 0; padding: 20px; }
        .container { max-width: 550px; margin: 40px auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        h2 { color: var(--primary); margin-bottom: 10px; font-size: 1.6rem; }
        p.subtitle { color: #666; margin-bottom: 25px; font-size: 0.95rem; }
        .input-box { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 12px; font-size: 1.2rem; text-align: center; box-sizing: border-box; transition: 0.3s; }
        .input-box:focus { border-color: var(--primary); outline: none; }
        .btn-check { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn-check:hover { background: #008442; }
        
        /* صناديق النتائج */
        #resultBox { margin-top: 30px; padding: 25px; border-radius: 15px; display: none; text-align: right; line-height: 1.6; }
        .status-pending { background: #fff8e1; border: 1px solid #ffcc80; color: #795548; }
        .status-accepted { background: #e8f5e9; border: 1px solid #81c784; color: #2e7d32; }
        .status-rejected { background: #ffebee; border: 1px solid #ef9a9a; color: #c62828; }
        
        .status-icon { font-size: 2.5rem; display: block; text-align: center; margin-bottom: 15px; }
        .nav-home { display: inline-block; margin-top: 25px; color: var(--primary); text-decoration: none; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>شيك على حالة طلبك</h2>
    <p class="subtitle">أدخل رقم الطلب اللي وصلك (مثال: SDB-12345)</p>
    
    <input type="text" id="orderInput" class="input-box" placeholder="اكتب رقم الطلب هنا">
    <button class="btn-check" onclick="checkMyStatus()">استعلم عن النتيجة</button>

    <div id="resultBox">
        <span id="statusIcon" class="status-icon"></span>
        <strong id="statusTitle" style="font-size: 1.2rem;"></strong>
        <p id="statusDesc" style="margin-top: 10px;"></p>
    </div>

    <a href="index.html" class="nav-home">🏠 العودة للرئيسية</a>
</div>

<script>
    const SUPABASE_URL = 'https://fyaxiwtkjdjmgfovsfmb.supabase.co';
    const SUPABASE_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YXhpd2t0amRqbWdmb3ZzZm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njc5MzcsImV4cCI6MjA5MjU0MzkzN30.gdkzSZJIlaOVSiLgvEy_wKV9cq1ZAMIkM8DMB9yvpgU';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function checkMyStatus() {
        const orderNum = document.getElementById('orderInput').value.trim();
        const resultBox = document.getElementById('resultBox');
        const sIcon = document.getElementById('statusIcon');
        const sTitle = document.getElementById('statusTitle');
        const sDesc = document.getElementById('statusDesc');

        if (!orderNum) {
            alert('يا غالي، اكتب رقم الطلب أولاً');
            return;
        }

        // البحث في قاعدة البيانات
        const { data, error } = await supabaseClient
            .from('applications')
            .select('*')
            .eq('order_number', orderNum)
            .single();

        resultBox.style.display = 'block';

        if (error || !data) {
            resultBox.className = 'status-rejected';
            sIcon.innerText = '❌';
            sTitle.innerText = 'الرقم غير صحيح';
            sDesc.innerText = 'تأكد من رقم الطلب المكتوب، إذا كنت ناسي الرقم تقدر تتواصل مع الدعم الفني.';
        } else {
            if (data.status === 'pending') {
                resultBox.className = 'status-pending';
                sIcon.innerText = '⏳';
                sTitle.innerText = 'طلبك تحت المراجعة';
                sDesc.innerText = `يا هلا يا ${data.full_name}، طلبك استلمناه وهو الحين عند الفريق المختص للتدقيق. خلك قريب وبنرد لك خبر في أقرب وقت بإذن الله.`;
            } else if (data.status === 'accepted') {
                resultBox.className = 'status-accepted';
                sIcon.innerText = '✅';
                sTitle.innerText = 'ألف مبروك، تم القبول!';
                sDesc.innerText = `مبروك يا ${data.full_name}، تمت الموافقة المبدئية على طلبك. فريقنا بيتواصل معك الحين على رقم جوالك لترتيب الخطوات الجاية.`;
            } else if (data.status === 'rejected') {
                resultBox.className = 'status-rejected';
                sIcon.innerText = '✋';
                sTitle.innerText = 'نعتذر منك..';
                sDesc.innerText = `للأسف يا ${data.full_name}، الطلب ما استوفى الشروط هذي المرة. تقدر تجرب تقدم مرة ثانية في وقت لاحق.`;
            }
        }
    }
</script>

</body>
</html>
