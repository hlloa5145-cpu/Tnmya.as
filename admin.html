<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم بنك التنمية | الإدارة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #006c35; --gold: #c5a059; --dark: #1a1a1a; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; direction: rtl; }
        
        /* شاشة الدخول */
        #loginOverlay { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        .btn-login { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* المحتوى الرئيسي */
        .admin-header { background: var(--primary); color: white; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 30px 5%; }
        
        /* بطاقات الإحصائيات */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; color: #666; font-size: 0.9rem; }
        .stat-card p { font-size: 1.8rem; font-weight: bold; margin: 10px 0; color: var(--primary); }

        /* الجدول */
        .table-wrap { background: white; border-radius: 15px; overflow-x: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f8f9fa; padding: 15px; text-align: right; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        
        /* الألوان والحالات */
        .badge { padding: 5px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; }
        .status-wait { background: #fff3cd; color: #856404; }
        .status-ok { background: #d4edda; color: #155724; }
        .status-no { background: #f8d7da; color: #721c24; }

        .sel-status { padding: 8px; border-radius: 5px; border: 1px solid #ddd; }
        .btn-save { background: var(--gold); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { background: var(--primary); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <i class="fas fa-lock" style="font-size: 2.5rem; color: var(--gold); margin-bottom: 15px;"></i>
        <h2>إدارة النظام</h2>
        <input type="password" id="adminPass" placeholder="أدخل كلمة المرور">
        <button class="btn-login" onclick="login()">دخول</button>
    </div>
</div>

<div id="mainContent" style="display: none;">
    <header class="admin-header">
        <div style="font-size: 1.4rem; font-weight: bold;"><i class="fas fa-user-shield"></i> لوحة إدارة الطلبات</div>
        <button onclick="location.reload()" style="background: white; color: var(--primary); border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">تحديث الصفحة</button>
    </header>

    <div class="container">
        <div class="stats">
            <div class="stat-card"><h3>إجمالي الطلبات</h3><p id="totalAll">0</p></div>
            <div class="stat-card"><h3>قيد المراجعة</h3><p id="totalWait" style="color: #856404;">0</p></div>
            <div class="stat-card"><h3>طلبات مقبولة</h3><p id="totalOk" style="color: green;">0</p></div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>العميل</th>
                        <th>الجوال</th>
                        <th>النوع</th>
                        <th>الحالة</th>
                        <th>تغيير الحالة</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="dataRows">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // بيانات الربط الخاصة بك
    const SUPABASE_URL = 'https://fyaxiwktjdjmgfovsfmb.supabase.co';
    const SUPABASE_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YXhpd2t0amRqbWdmb3ZzZm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njc5MzcsImV4cCI6MjA5MjU0MzkzN30.gdkzSZJIlaOVSiLgvEy_wKV9cq1ZAMIkM8DMB9yvpgU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function login() {
        const pass = document.getElementById('adminPass').value;
        if(pass === "123456") { // يمكنك تعديل كلمة المرور من هنا
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            loadRequests();
        } else {
            alert("كلمة المرور غير صحيحة!");
        }
    }

    async function loadRequests() {
        const { data, error } = await _supabase.from('applications').select('*').order('created_at', { ascending: false });
        if (error) return alert("خطأ في جلب البيانات");

        const tbody = document.getElementById('dataRows');
        tbody.innerHTML = '';
        
        let wait = 0, ok = 0;
        document.getElementById('totalAll').innerText = data.length;

        data.forEach(req => {
            if(req.status === 'قيد المراجعة') wait++;
            if(req.status === 'تم القبول') ok++;

            let sClass = req.status === 'تم القبول' ? 'status-ok' : (req.status === 'تم الرفض' ? 'status-no' : 'status-wait');

            tbody.innerHTML += `
                <tr>
                    <td><b>${req.full_name}</b><br><small>${req.city}</small></td>
                    <td>${req.phone}</td>
                    <td>${req.finance_type}</td>
                    <td><span class="badge ${sClass}">${req.status}</span></td>
                    <td>
                        <select id="sel-${req.id}" class="sel-status">
                            <option value="قيد المراجعة" ${req.status === 'قيد المراجعة' ? 'selected' : ''}>مراجعة</option>
                            <option value="تم القبول" ${req.status === 'تم القبول' ? 'selected' : ''}>قبول ✅</option>
                            <option value="تم الرفض" ${req.status === 'تم الرفض' ? 'selected' : ''}>رفض ❌</option>
                        </select>
                    </td>
                    <td><button class="btn-save" onclick="updateStatus('${req.id}', '${req.phone}')">حفظ</button></td>
                </tr>`;
        });
        document.getElementById('totalWait').innerText = wait;
        document.getElementById('totalOk').innerText = ok;
    }

    async function updateStatus(id, phone) {
        const newStatus = document.getElementById(`sel-${id}`).value;
        const { error } = await _supabase.from('applications').update({ status: newStatus }).eq('id', id);

        if (!error) {
            alert("تم تحديث حالة العميل: " + phone);
            loadRequests(); // تحديث الجدول تلقائياً
        } else {
            alert("فشل التحديث، تأكد من صلاحيات قاعدة البيانات");
        }
    }
</script>
</body>
</html>
