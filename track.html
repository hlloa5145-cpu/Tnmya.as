<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تتبع الطلب | بنك التنمية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; text-align: center; padding: 50px; direction: rtl; }
        .track-container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; }
        .btn-track { width: 100%; padding: 12px; background: #c5a059; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #statusResult { margin-top: 20px; padding: 15px; border-radius: 10px; font-weight: bold; display: none; }
        .pending { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="track-container">
    <h2>استعلام عن حالة الطلب</h2>
    <input type="tel" id="trackPhone" placeholder="أدخل رقم الجوال المسجل">
    <button class="btn-track" onclick="checkStatus()">استعلام الآن</button>
    <div id="statusResult"></div>
</div>

<script>
    const S_URL = 'https://fyaxiwktjdjmgfovsfmb.supabase.co';
    const S_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YXhpd2t0amRqbWdmb3ZzZm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njc5MzcsImV4cCI6MjA5MjU0MzkzN30.gdkzSZJIlaOVSiLgvEy_wKV9cq1ZAMIkM8DMB9yvpgU';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    async function checkStatus() {
        const phone = document.getElementById('trackPhone').value;
        const resDiv = document.getElementById('statusResult');
        resDiv.style.display = 'block';
        resDiv.innerHTML = "جاري البحث...";

        const { data, error } = await _supabase.from('applications').select('status').eq('phone', phone).maybeSingle();

        if (data) {
            resDiv.innerHTML = `حالة طلبك الحالية: <br> <b>[ ${data.status} ]</b>`;
            resDiv.className = data.status === 'تم القبول' ? 'success' : (data.status === 'تم الرفض' ? 'error' : 'pending');
        } else {
            resDiv.innerHTML = "❌ عذراً، لا يوجد طلب مسجل بهذا الرقم.";
            resDiv.className = 'error';
        }
    }
</script>
</body>
</html>
