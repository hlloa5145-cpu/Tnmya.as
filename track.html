<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متابعة الطلب | بنك التنمية</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; text-align: center; padding: 50px 20px; direction: rtl; }
        .track-box { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; }
        .btn-track { width: 100%; padding: 12px; background: #006c35; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #statusDisplay { display: none; margin-top: 25px; padding: 20px; background: #fff3cd; color: #856404; border-radius: 10px; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="track-box">
    <i class="fas fa-search" style="font-size: 2rem; color: #006c35;"></i>
    <h2>استعلام عن حالة الطلب</h2>
    <p>أدخل رقم الجوال الذي قدمت به</p>
    <input type="tel" id="userPhone" placeholder="05xxxxxxxx">
    <button class="btn-track" onclick="showStatus()">استعلام الآن</button>

    <div id="statusDisplay">
        <h4 style="margin:0;">⏳ حالة الطلب: قيد المراجعة</h4>
        <p style="font-size: 0.85rem; margin-top: 10px;">عزيزي العميل، طلبك حالياً تحت التدقيق من قبل القسم المختص. سيتم إرسال رسالة نصية (SMS) إلى رقم جوالك فور صدور القرار النهائي.</p>
    </div>
</div>

<script>
    function showStatus() {
        const phone = document.getElementById('userPhone').value;
        if(phone.length < 10) {
            alert("يرجى إدخال رقم جوال صحيح");
            return;
        }
        document.getElementById('statusDisplay').style.display = 'block';
    }
</script>
</body>
</html>
