<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تقديم الطلب | بنك التنمية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f5; direction: rtl; padding: 20px; }
        .apply-card { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #006c35; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: #006c35; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="apply-card">
    <h2>إكمال طلب التمويل</h2>
    <form id="loanForm">
        <input type="text" id="fullName" placeholder="الاسم الكامل" required>
        <input type="tel" id="phone" placeholder="رقم الجوال (05xxxxxxxx)" required>
        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        <input type="text" id="city" placeholder="المدينة" required>
        <button type="submit" class="btn-submit" id="subBtn">إرسال الطلب</button>
    </form>
</div>

<script>
    const S_URL = 'https://fyaxiwktjdjmgfovsfmb.supabase.co';
    const S_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5YXhpd2t0amRqbWdmb3ZzZm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njc5MzcsImV4cCI6MjA5MjU0MzkzN30.gdkzSZJIlaOVSiLgvEy_wKV9cq1ZAMIkM8DMB9yvpgU';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    document.getElementById('loanForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        btn.disabled = true;
        btn.innerText = "جاري الحفظ...";

        const data = {
            full_name: document.getElementById('fullName').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            city: document.getElementById('city').value,
            finance_type: localStorage.getItem('selectedFinance') || 'تمويل عام',
            status: 'قيد المراجعة'
        };

        try {
            // 1. الحفظ في سوبابيز
            const { error } = await _supabase.from('applications').insert([data]);
            if (error) throw error;

            // 2. إرسال لتليجرام (اختياري للتنبيه)
            const msg = `🔔 طلب جديد:\nالاسم: ${data.full_name}\nالجوال: ${data.phone}\nالنوع: ${data.finance_type}`;
            fetch(`https://api.telegram.org/bot8688016586:AAFEd6EBgeu5pTWtLTstuN2YFsZytQBWwH8/sendMessage?chat_id=5516597110&text=${encodeURIComponent(msg)}`);

            alert('تم تقديم طلبك بنجاح! يمكنك متابعة الحالة برقم جوالك.');
            window.location.href = 'track.html';
        } catch (err) {
            alert('حدث خطأ في الاتصال بقاعدة البيانات');
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
